<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>
    * {
      margin: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 600;
      line-height: 1.4;
      background: rgba(255, 255, 255, 0.12);
      padding: 24px 32px;
      border-radius: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <h1>Hello Dosto, Apka Swaagat Hai 👋<br>My name is Priyanka</h1>

</html>
