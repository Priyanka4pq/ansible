---
# tasks file for role/docker

- name: update system
  apt:
    name: "*"
    state: latest

- name: Install Docker.io
  apt:
    name: docker.io
    state: latest

- name: Add users to Docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_user }}" 

- name: Restart Docker
  service:
    name: docker
    state: restarted

- name: Register  Docker Version
  command: docker --version
  register:   docker_version

- name: Show Docker version
  debug:
    msg: "{{ docker_version }}"

- name: Show running containers
  command: docker ps
